<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSSA Slang Helper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="p-wrap">

    <!-- Header -->
    <header class="p-header">
      <div class="p-logo">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <rect width="26" height="26" rx="7" fill="#F0E8C4"/>
          <text x="13" y="18" font-family="DM Sans, Arial, sans-serif" font-size="13" font-weight="700" fill="#2E2040" text-anchor="middle">S</text>
        </svg>
        <span class="p-title">Slang Helper</span>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="p-stats">
      <span><strong id="wordCount">0</strong> words saved</span>
      <span class="p-stats-sub">Hover any page to discover words</span>
    </div>

    <!-- Search -->
    <div class="p-search-wrap">
      <svg class="p-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#A98088" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" class="p-search" placeholder="Search your saved words…">
    </div>

    <!-- Section label -->
    <div class="p-sec-label">SAVED WORDS</div>

    <!-- Word list -->
    <div class="p-list" id="wordList">
      <div class="p-empty" id="emptyState">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#C4B8DC" stroke-width="1.5">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>No words saved yet.<br>Hover over slang to get started!</p>
      </div>
    </div>

    <!-- Footer -->
    <footer class="p-footer">
      <button class="p-clear-btn" id="clearBtn">Clear all</button>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
